<!DOCTYPE html>
<html>
<head>
    <title>Request Blood - BloodBond</title>
    <link rel="stylesheet" href="../../asessts/css/request.css">
</head>
<body>

<div class="request-container">

    <h1>Blood Request Form 🩸</h1>

    <form class="request-form">

        <div class="form-group">
            <label>Hospital Name</label>
            <input type="text" placeholder="Enter hospital name" required>
        </div>

        <div class="form-group">
            <label>Blood Group</label>
            <select required>
                <option value="">Select Blood Group</option>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>O+</option>
                <option>O-</option>
                <option>AB+</option>
                <option>AB-</option>
            </select>
        </div>

        <div class="form-group">
            <label>Units Required</label>
            <input type="number" placeholder="Enter number of units" required>
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" placeholder="Enter city/location" required>
        </div>

        <div class="form-group">
            <label>Urgency Level</label>
            <select required>
                <option value="">Select Urgency</option>
                <option>Normal</option>
                <option>Urgent</option>
                <option>Emergency</option>
            </select>
        </div>

        <button type="submit" class="submit-btn">Submit Request</button>

    </form>

</div>

</body>
</html>
