<!DOCTYPE html>
<html>
<head>
    <title>My Profile - BloodBond</title>
    <!-- ✅ FIXED: was ../../asessts/ -->
    <link rel="stylesheet" href="/assets/css/profile.css">
</head>
<body>

<div class="profile-container">

    <h1>My Profile 👤</h1>

    <div class="profile-card">

        <form class="profile-form">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="profileName" placeholder="Full Name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="profileEmail" placeholder="Email">
            </div>

            <div class="form-group">
                <label>Blood Group</label>
                <select id="profileBloodGroup">
                    <option value="O+">O+</option>
                    <option value="A+">A+</option>
                    <option value="B+">B+</option>
                    <option value="AB+">AB+</option>
                    <option value="A-">A-</option>
                    <option value="B-">B-</option>
                    <option value="O-">O-</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="profilePhone" placeholder="Enter phone number">
            </div>

            <div class="form-group">
                <label>Availability</label>
                <select id="profileAvailability">
                    <option value="AVAILABLE">Available</option>
                    <option value="NOT_AVAILABLE">Not Available</option>
                </select>
            </div>

            <button type="submit" class="update-btn">Update Profile</button>

        </form>

    </div>

</div>

<!-- ✅ FIXED: JS connected -->
<script src="/assets/js/auth.js"></script>

</body>
</html>
