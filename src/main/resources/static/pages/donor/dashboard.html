<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Dashboard</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>

<body>

<!-- ===== NAVBAR ===== -->
<header class="navbar">
    <div class="logo">
        <h2>BloodBond 🩸</h2>
    </div>

    <div class="nav-right">

        <!-- Notification Bell -->
        <div class="notification-container">
            <div class="notification-icon" onclick="toggleNotification()">
                🔔
                <span class="badge" id="notificationCount">0</span>
            </div>

            <div class="notification-dropdown" id="notificationDropdown">
                <p class="no-notification">No new notifications</p>
            </div>
        </div>

        <button class="logout-btn" onclick="logout()">Logout</button>

    </div>
</header>

<!-- ===== MAIN CONTENT ===== -->
<main class="dashboard">

    <h1>Welcome, Donor 👋</h1>

    <div class="card-container">

        <div class="card">
            <h3>Total Donations</h3>
            <p id="totalDonations">5</p>
        </div>

        <div class="card">
            <h3>Blood Group</h3>
            <p id="bloodGroup">O+</p>
        </div>

        <div class="card">
            <h3>Pending Requests</h3>
            <p id="pendingRequests">2</p>
        </div>

        <div class="card">
            <h3>Last Donation Date</h3>
            <p id="lastDonationDate">10 Jan 2026</p>
        </div>

    </div>

</main>

<script src="/assets/js/auth.js"></script>
<script src="/assets/js/notification.js"></script>
<script src="/assets/js/donor.js"></script>
<script>
    window.onload = function() {
        loadDonorDashboard();
        loadNotifications(); // ✅ Load bell notifications
    };
</script>

</body>
</html>
