<!DOCTYPE html>
<html>
<head>
    <title>Request Blood - BloodBond</title>
    <!-- ✅ FIXED: was ../../asessts/ -->
    <link rel="stylesheet" href="/assets/css/form.css">
</head>
<body>

<div class="form-container">
    <h2>Request Blood 🩸</h2>

    <form onsubmit="submitBloodRequest(event)">

        <input type="text" id="patientName" placeholder="Patient Name" required>

        <select id="bloodGroup" required>
            <option value="">Required Blood Group</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
        </select>

        <input type="text" id="hospitalName" placeholder="Hospital Name" required>
        <input type="date" id="requiredDate" required>
        <button type="submit">Submit Request</button>

    </form>

    <div style="text-align:center; margin-top:15px;">
        <a href="/pages/donor/dashboard.html">← Back to Dashboard</a>
    </div>
</div>

<!-- ✅ FIXED: JS connected -->
<script src="/assets/js/auth.js"></script>
<script>
    async function submitBloodRequest(event) {
        event.preventDefault();

        const data = {
            patientName: document.getElementById("patientName").value,
            bloodGroup: document.getElementById("bloodGroup").value,
            hospitalName: document.getElementById("hospitalName").value,
            requiredDate: document.getElementById("requiredDate").value
        };

        // Uses authorizedFetch from auth.js (sends JWT token automatically)
        const response = await authorizedFetch("/api/donors", {
            method: "POST",
            body: JSON.stringify(data)
        });

        if (response && response.ok) {
            alert("Blood request submitted successfully!");
            window.location.href = "/pages/donor/dashboard.html";
        } else {
            alert("Failed to submit request. Please try again.");
        }
    }
</script>

</body>
</html>
